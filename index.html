<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360 Indoor Viewer</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: sans-serif;
}

#pano {
  position: fixed;
  width: 100vw;
  height: 100vh;
}

/* PLAY */
#playBtn {
  position: fixed;
  right: 20px;
  bottom: 100px;
  z-index: 15;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
  color: white;
  border: none;
  cursor: pointer;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  top: 80px;
  left: 0;
  padding-left: 12px;
  z-index: 20;
  display: flex;
  flex-direction: column;
}

.sidebar-title {
  font-size: 14px;
  letter-spacing: 0.14em;
  margin-bottom: 12px;
  color: white;
}

#sidebarList {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  padding: 6px;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(4px);
  max-height: 70vh;
  overflow-y: auto;
}

#sidebarList .item {
  width: 100%;
  text-align: left;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
}

#sidebarList .item.active {
  color: white;
}

/* TIMELINE */
#timeline {
  position: fixed;
  bottom: 40px;
  width: 100%;
  display: flex;
  gap: 40px;
  overflow-x: auto;
  z-index: 10;
}

.item {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: rgba(255,255,255,0.4);
}

.item.active {
  color: white;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
}

.item.active .dot {
  background: white;
}

.label {
  font-size: 12px;
}

/* FLOORPLAN */
#floorplan {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 260px;
  z-index: 20;
}

#floorplan img {
  width: 100%;
}

.hotspot {
  position: absolute;
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
}

.hotspot.active {
  background: red;
}
</style>
</head>

<body>

<div id="pano"></div>

<div id="sidebar">
  <div class="sidebar-title">Tilat</div>
  <div id="sidebarList"></div>
</div>

<div id="timeline"></div>

<div id="floorplan">
  <img src="floorplan.png">
</div>

<button id="playBtn">▶</button>

<script src="https://unpkg.com/marzipano/dist/marzipano.js"></script>
<script src="app.js"></script>

</body>
</html>
