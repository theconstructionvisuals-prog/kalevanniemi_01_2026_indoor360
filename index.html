<!DOCTYPE html>
<html lang="fi">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>360 Indoor Viewer</title>

<style>

body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: sans-serif;
}

#pano {
  position: fixed;
  width: 100vw;
  height: 100vh;
}

/* SIDEBAR */

#sidebar {
  position: fixed;

  top: 80px;
  left: 0;

  padding-left: 12px;

  z-index: 20;

  display: flex;
  flex-direction: column;
}

/* TITLE */

.sidebar-title {
  font-size: 11px;

  letter-spacing: 0.28em;
  text-transform: uppercase;

  color: rgba(255,255,255,0.92);

  margin-bottom: 18px;

  padding-bottom: 10px;
  padding-left: 2px;

  font-weight: 500;

  position: relative;
}

.sidebar-title::after {
  content: "";

  position: absolute;

  left: 2px;
  bottom: 0;

  width: 42px;
  height: 1px;

  background: rgba(255,255,255,0.22);
}

/* ROOM LIST */

#sidebarList {
  display: flex;
  flex-direction: column;
  align-items: flex-start;

  gap: 6px;

  padding: 8px 10px;

  background: rgba(0,0,0,0.22);
  backdrop-filter: blur(6px);

  border-radius: 10px;

  max-height: 70vh;
  overflow-y: auto;
}

#sidebarList .item {
  width: 100%;

  text-align: left;
  font-size: 12px;

  color: rgba(255,255,255,0.5);

  cursor: pointer;

  transition:
    color 0.2s ease,
    transform 0.2s ease;
}

#sidebarList .item.active {
  color: white;

  transform: translateX(4px);
}

/* FLOOR BUTTONS */

#floorButtons {
  position: fixed;

  left: 20px;
  bottom: 20px;

  z-index: 50;

  display: flex;
  flex-direction: column;

  overflow: hidden;

  border-radius: 10px;

  background: rgba(18,18,18,0.42);
  backdrop-filter: blur(14px);

  border: 1px solid rgba(255,255,255,0.08);
}

.floorBtn {
  min-width: 150px;

  padding: 14px 18px;

  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.06);

  background: transparent;

  color: rgba(255,255,255,0.55);

  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;

  text-align: left;

  cursor: pointer;

  transition:
    background 0.22s ease,
    color 0.22s ease,
    padding-left 0.22s ease;
}

.floorBtn:last-child {
  border-bottom: none;
}

.floorBtn:hover {
  background: rgba(255,255,255,0.05);

  color: rgba(255,255,255,0.88);

  padding-left: 22px;
}

.floorBtn.active {
  background: rgba(255,255,255,0.08);

  color: white;

  box-shadow:
    inset 2px 0 0 rgba(255,255,255,0.9);
}

/* FLOORPLAN */

#floorplan {
  position: fixed;

  right: 20px;
  top: 50%;

  transform:
    translateY(-50%)
    translateX(20px)
    scale(0.96);

  width: 50vw;
  max-width: 900px;

  height: 85vh;

  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;

  transition:
    opacity 0.28s ease,
    transform 0.28s ease;

  z-index: 30;
}

#floorplan.open {
  opacity: 1;
  pointer-events: auto;

  transform:
    translateY(-50%)
    translateX(0)
    scale(1);
}

/* WRAPPER */

#floorplanWrapper {
  position: relative;

  width: 100%;
  height: 100%;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* FLOORPLAN IMAGE */

#floorplanWrapper img {
  max-width: 100%;
  max-height: 100%;

  width: auto;
  height: auto;

  display: block;

  opacity: 0.5;

  border-radius: 18px;
}

/* HOTSPOTS */

.hotspot {
  position: absolute;

  width: 14px;
  height: 14px;

  background: #ffd84d;

  border-radius: 50%;

  transform: translate(-50%, -50%);

  cursor: pointer;

  animation: pulse 2s infinite;

  transition:
    transform 0.25s ease,
    background 0.25s ease,
    width 0.25s ease,
    height 0.25s ease,
    box-shadow 0.25s ease;

  box-shadow:
    0 0 0 rgba(255,216,77,0.7);
}

.hotspot.active {
  width: 20px;
  height: 20px;

  background: #ff3b30;

  box-shadow:
    0 0 22px rgba(255,59,48,0.9);

  z-index: 2;
}

/* PULSE */

@keyframes pulse {

  0% {
    box-shadow:
      0 0 0 0 rgba(255,216,77,0.7);
  }

  70% {
    box-shadow:
      0 0 0 14px rgba(255,216,77,0);
  }

  100% {
    box-shadow:
      0 0 0 0 rgba(255,216,77,0);
  }
}

/* MOBILE */

@media (max-width: 768px) {

  #floorplan {
    width: 95vw;
    height: 70vh;

    right: 2.5vw;
  }

  #floorButtons {
    left: 10px;
    bottom: 10px;
  }

  #sidebar {
    top: 20px;
    left: 10px;
  }
}

</style>
</head>

<body>

<div id="pano"></div>

<!-- SIDEBAR -->

<div id="sidebar">

  <div class="sidebar-title">
    TILAT
  </div>

  <div id="sidebarList"></div>

</div>

<!-- FLOOR BUTTONS -->

<div id="floorButtons">

  <button class="floorBtn active" data-floor="ground">
    MAATASO
  </button>

  <button class="floorBtn" data-floor="floor1">
    1. KERROS
  </button>

  <button class="floorBtn" data-floor="floor2">
    2. KERROS
  </button>

  <button class="floorBtn" data-floor="floor3">
    3. KERROS
  </button>

</div>

<!-- FLOORPLAN -->

<div id="floorplan">

  <div id="floorplanWrapper">
    <img id="floorplanImage" src="floorplan-maa.png">
  </div>

</div>

<script src="https://unpkg.com/marzipano/dist/marzipano.js"></script>
<script src="app.js"></script>

</body>
</html>
