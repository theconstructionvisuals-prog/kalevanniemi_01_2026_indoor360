<!DOCTYPE html>

<html lang="fi">
<head>
<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>360 Timeline Viewer</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: sans-serif;
}

#pano {
  position: fixed;
  width: 100vw;
  height: 100vh;
}

/* 🔥 PLAY BUTTON */
#playBtn {
  position: fixed;
  right: 20px;
  bottom: 100px;
  z-index: 15;

  width: 44px;
  height: 44px;
  border-radius: 50%;

  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);

  color: white;
  font-size: 16px;

  border: none;
  cursor: pointer;
}

/* gradient */
#bottomFade {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 160px;
  background: linear-gradient(to top, rgba(0,0,0,0.55), transparent);
  pointer-events: none;
  z-index: 5;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  top: 80px; /* 🔥 siirretty alemmas */
  left: 8px;
  z-index: 20;
  max-height: calc(100vh - 40px);
  display: flex;
  flex-direction: column;
}

/* TITLE */
.sidebar-title {
  font-size: 14px;
  letter-spacing: 0.14em;
  margin-bottom: 12px;
  color: white;
  text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  position: relative;
}

.sidebar-title::after {
  content: "";
  display: block;
  width: 100%; /* 🔥 koko leveys */
  height: 1px;
  margin-top: 6px;
  background: rgba(255,255,255,0.2);
}

/* LIST */
#sidebarList {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 6px 8px;
  border-radius: 6px;
  width: fit-content;
  background: rgba(0, 0, 0, 0.10);
  backdrop-filter: blur(4px);
  overflow-y: auto;
  max-height: calc(100vh - 100px);
  scrollbar-width: none;
  position: relative;
  cursor: grab;
}

#sidebarList:active {
  cursor: grabbing;
}

#sidebarList::-webkit-scrollbar {
  display: none;
}

/* fade */
#sidebarList::before {
  content: "";
  position: absolute;
  top: 0;
  width: 100%;
  height: 20px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.25), transparent);
  pointer-events: none;
}

#sidebarList::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.25), transparent);
  pointer-events: none;
}

/* ITEMS */
#sidebarList .item {
  font-size: 12px;
  padding-left: 2px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
}

#sidebarList .item.active {
  color: white;
}

/* TIMELINE */
#timeline {
  position: fixed;
  bottom: 40px;
  width: 100%;
  display: flex;
  gap: 40px;
  overflow-x: auto;
  cursor: grab;
  z-index: 10;
}

#timeline::-webkit-scrollbar {
  display: none;
}

/* ITEMS */
.item {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 8px;
  color: rgba(255,255,255,0.4);
}

.item.active {
  color: white;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  margin-bottom: 6px;
}

.item.active .dot {
  background: white;
  transform: scale(1.4) translateY(2px);
}

.label {
  font-size: 12px;
}

/* TABLET */
@media (max-width: 1100px) {
  #timeline { bottom: 20px; gap: 28px; }
  .dot { width: 14px; height: 14px; }
  .label { font-size: 13px; }
  #bottomFade { height: 140px; }
}

/* MOBILE */
@media (max-width: 900px) {
  #sidebar { display: none; }
  #timeline { bottom: 24px; gap: 32px; }
  .dot { width: 18px; height: 18px; }
  .label { font-size: 16px; }
  #bottomFade { height: 160px; }
}
</style>

</head>

<body>

<div id="pano"></div>
<div id="bottomFade"></div>

<div id="sidebar">
  <div class="sidebar-title">Kalevanniemen Kampus, Naantali</div>
  <div id="sidebarList"></div>
</div>

<div id="timeline"></div>

<!-- 🔥 PLAY BUTTON -->
<button id="playBtn">▶</button>

<script src="https://unpkg.com/marzipano/dist/marzipano.js"></script>
<script src="app.js"></script>

</body>
</html>
